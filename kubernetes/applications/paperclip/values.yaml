# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json
---
controllers:
  paperclip:
    strategy: Recreate
    pod:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    initContainers:
      chown-data:
        image:
          repository: public.ecr.aws/docker/library/busybox
          tag: "1.38.0@sha256:b6762ddf4a50aabb5f4d21aa6f447d05d5633fb09f09c08b33f22356a2f98be0"
        command:
          - chown
          - "1000:1000"
          - /home/paperclip
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            add: ["CHOWN"]
            drop: ["ALL"]
    containers:
      app:
        image:
          # Built by smauermann/images from images/paperclip/Dockerfile.
          # No digest pinned yet - add one once this has actually been
          # built and pushed at least once.
          repository: ghcr.io/smauermann/paperclip
          tag: sha-903886b
        env:
          # The Claude Code / Codex adapters spawn those CLIs as
          # subprocesses in this same container, so their credentials
          # (~/.claude, ~/.codex) need to live under a persisted HOME.
          HOME: /home/paperclip
          # NOTE: PORT and any other required env vars aren't confirmed
          # against the real image yet - docs.paperclip.ing blocked
          # scripted fetches and the repo's README/Dockerfile paths
          # 404'd during research. Verify against the running container
          # (logs / --help) and adjust before/after first deploy.
          PORT: "3100"
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: postgres-user
                key: url
        envFrom:
          - secretRef:
              name: paperclip-secrets
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 2Gi

service:
  app:
    controller: paperclip
    ports:
      http:
        port: 3100

route:
  app:
    kind: HTTPRoute
    annotations:
      gethomepage.dev/description: AI agent orchestration
      gethomepage.dev/enabled: "true"
      gethomepage.dev/group: Personal
      gethomepage.dev/icon: sh-paperclip
      gethomepage.dev/name: Paperclip
    parentRefs:
      - name: private
        kind: Gateway
        namespace: envoy-gateway-system
    hostnames:
      - paperclip.costanza.cloud

persistence:
  home:
    existingClaim: paperclip-data
    globalMounts:
      - path: /home/paperclip
