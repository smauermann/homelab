controllers:
  garage:
    containers:
      app:
        image:
          repository: dxflrs/garage
          tag: v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
        env:
          TZ: "Europe/Berlin"
        envFrom:
          - secretRef:
              name: garage
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 100m
          limits:
            memory: 5Gi

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

service:
  app:
    ports:
      s3:
        port: &port 3900
      api:
        port: 3903

route:
  app:
    hostnames:
      - s3.costanza.cloud
    parentRefs:
      - name: private
        namespace: envoy-gateway-system
    rules:
      - backendRefs:
          - name: garage
            port: *port

persistence:
  config:
    enabled: true
    type: configMap
    name: garage-config
    globalMounts:
      - path: /etc/garage.toml
        subPath: configuration.toml
  data:
    type: nfs
    server: nas.internal
    path: /volume1/homelab/garage/data
    globalMounts:
      - path: /data
  meta:
    type: nfs
    server: nas.internal
    path: /volume1/homelab/garage/meta
    globalMounts:
      - path: /meta
