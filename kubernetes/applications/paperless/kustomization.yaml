apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: &app paperless

resources:
  - namespace.yaml
  - dragonfly.yaml
  - secret.yaml

helmCharts:
  - name: app-template
    repo:  https://bjw-s-labs.github.io/helm-charts
    version: 4.6.2
    releaseName: *app
    namespace: *app
    valuesFile: values.yaml
  - name: pvc-backup
    repo: https://smauermann.github.io/helm-charts
    version: 2.2.1
    releaseName: paperless-backup
    valuesInline:
      appName: *app
      backup:
        pvcName: paperless-data
      restore:
        enabled: true
        pvcSize: 4Gi
