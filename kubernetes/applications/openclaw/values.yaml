# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/library/common/values.schema.json
---
controllers:
  openclaw:
    strategy: Recreate
    pod:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    containers:
      app:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: 2026.4.15@sha256:9d5f1dfbd5deedc37706c78f745b958ffbe9b4f20840cfb4d49c617a50326902
        env:
          HOME: /home/node
          OPENCLAW_CONFIG_DIR: /home/node/.openclaw
          NODE_ENV: production
        envFrom:
          - secretRef:
              name: openclaw-secrets
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 2Gi

service:
  app:
    controller: openclaw
    ports:
      http:
        port: 18789

route:
  app:
    kind: HTTPRoute
    annotations:
      gethomepage.dev/description: Personal AI assistant
      gethomepage.dev/enabled: "true"
      gethomepage.dev/group: Personal
      gethomepage.dev/icon: mdi-robot
      gethomepage.dev/name: OpenClaw
    parentRefs:
      - name: private
        kind: Gateway
        namespace: envoy-gateway-system
    hostnames:
      - openclaw.costanza.cloud

persistence:
  home:
    existingClaim: openclaw-data
    globalMounts:
      - path: /home/node/.openclaw
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
