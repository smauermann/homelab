---
# VictoriaLogs single-node deployment configuration

server:
  # Enable persistent storage
  persistentVolume:
    enabled: true
    storageClass: longhorn-single-replica
    accessModes:
      - ReadWriteOnce
    size: 50Gi

  # Retention period
  retentionPeriod: "14d"

  # Resource configuration
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  # Logging configuration
  logLevel: INFO

  # Enable JSON line output for logs
  extraArgs:
    "http.pathPrefix": "/"

  service:
    type: ClusterIP
    servicePort: 9428

  serviceMonitor:
    enabled: true
    extraLabels:
      prometheus: monitoring
