# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/library/common/values.schema.json
---
controllers:
  openclaw:
    strategy: Recreate
    pod:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    initContainers:
      chown-data:
        image:
          repository: public.ecr.aws/docker/library/busybox
          tag: "1.37.0"
        command:
          - chown
          - "1000:1000"
          - /home/node/.openclaw
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            add: ["CHOWN"]
            drop: ["ALL"]
    containers:
      app:
        image:
          repository: ghcr.io/smauermann/openclaw
          tag: 2026.5.12@sha256:bb572d735a124c37e9f3d8486ce55acd1585da7b4747c5cbf0bd815db84bf6a1
        env:
          HOME: /home/node
          OPENCLAW_CONFIG_DIR: /home/node/.openclaw
          NODE_ENV: production
        envFrom:
          - secretRef:
              name: openclaw-secrets
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        lifecycle:
          postStart:
            exec:
              command:
                - sh
                - -c
                - |
                  for i in $(seq 1 60); do
                    openclaw browser start && exit 0
                    sleep 2
                  done
                  exit 1
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 2Gi

service:
  app:
    controller: openclaw
    ports:
      http:
        port: 18789

route:
  app:
    kind: HTTPRoute
    annotations:
      gethomepage.dev/description: Personal AI assistant
      gethomepage.dev/enabled: "true"
      gethomepage.dev/group: Personal
      gethomepage.dev/icon: sh-openclaw
      gethomepage.dev/name: OpenClaw
    parentRefs:
      - name: private
        kind: Gateway
        namespace: envoy-gateway-system
    hostnames:
      - openclaw.costanza.cloud

persistence:
  home:
    existingClaim: openclaw-data
    globalMounts:
      - path: /home/node/.openclaw
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
  cache:
    type: emptyDir
    globalMounts:
      - path: /home/node/.cache
  config:
    type: emptyDir
    globalMounts:
      - path: /home/node/.config
